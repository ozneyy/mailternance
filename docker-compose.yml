services:
  mailternance:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mailternance
    restart: unless-stopped

    # Port : HOST:CONTAINER
    
    ports:
      - "17890:17890"

    # Fichiers sensibles et données persistantes montés en volume
    volumes:
      # Credentials Gmail (.env à la racine)
      - ./.env:/app/.env
      # Dossier de données persistantes (historique, réponses, modèles, paramètres, destinataires)
      - ./data:/app/data
      # Pièces jointes (CV, etc.)
      - ./web/attachments:/app/web/attachments
      # Logs de l'application
      - ./logs:/app/logs

    environment:
      # Forcer le port web sur 17890
      - PORT=17890
      # Indiquer à l'application d'utiliser le dossier de données monté
      - DATA_DIR=data
      - CSV_PATH=data/recipients.csv
      # Les autres variables sont lues depuis le fichier .env monté

    # Healthcheck : vérifie que le dashboard répond
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:17890/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
